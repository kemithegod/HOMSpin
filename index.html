<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spin for The House — House of Melanin</title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=MedievalSharp&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root {
    --black:   #050305;
    --black2:  #0a060f;
    --black3:  #140a1e;
    --purple:  #6a0dad;
    --purple2: #9b30d0;
    --purple3: #c77dff;
    --gold:    #c9a84c;
    --gold2:   #e8cc7a;
    --cream:   #f0e6d0;
    --muted:   #4a3560;
    --muted2:  #7a5a9a;
    --rose:    #c0392b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--cream);
    font-family: 'IM Fell English', serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    overflow-x: hidden; position: relative;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(106,13,173,0.2) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 90% 90%, rgba(106,13,173,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 10% 60%, rgba(201,168,76,0.06) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 256px; pointer-events: none; z-index: 0; opacity: 0.6;
  }

  /* GATE */
  #gate {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--black);
    padding: 40px 24px; text-align: center;
    transition: opacity 0.6s ease;
  }
  #gate.out { opacity: 0; pointer-events: none; }

  .gate-sigil { font-size: 48px; margin-bottom: 16px; filter: drop-shadow(0 0 24px rgba(106,13,173,0.8)); }
  .gate-server { font-family: 'UnifrakturMaguntia', cursive; font-size: 13px; letter-spacing: 0.3em; color: var(--purple3); opacity: 0.7; margin-bottom: 10px; }
  .gate-title { font-family: 'UnifrakturMaguntia', cursive; font-size: clamp(2rem, 9vw, 3.5rem); color: var(--cream); line-height: 1.1; margin-bottom: 6px; }
  .gate-title em { color: var(--purple3); font-style: normal; }
  .gate-rule { width: 120px; height: 1px; background: linear-gradient(90deg, transparent, var(--purple2), transparent); margin: 20px auto; }
  .gate-sub { font-size: 14px; font-style: italic; color: var(--muted2); margin-bottom: 28px; }
  .gate-label { font-family: 'UnifrakturMaguntia', cursive; font-size: 11px; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 10px; }

  #gateInput {
    background: rgba(10,6,15,0.95); border: 1px solid rgba(106,13,173,0.4); border-radius: 1px;
    color: var(--cream); font-family: 'IM Fell English', serif; font-size: 18px;
    text-align: center; padding: 13px 22px; width: min(300px, 88vw); outline: none;
    letter-spacing: 0.06em; transition: border-color 0.2s, box-shadow 0.2s;
  }
  #gateInput::placeholder { color: rgba(74,53,96,0.5); font-style: italic; }
  #gateInput:focus { border-color: rgba(106,13,173,0.8); box-shadow: 0 0 0 3px rgba(106,13,173,0.1); }

  #gateBtn {
    margin-top: 14px; width: min(300px, 88vw); padding: 13px;
    background: transparent; border: 1px solid var(--purple2); color: var(--purple3);
    font-family: 'UnifrakturMaguntia', cursive; font-size: 14px; letter-spacing: 0.3em;
    cursor: pointer; border-radius: 1px; transition: background 0.2s, box-shadow 0.2s;
  }
  #gateBtn:hover { background: rgba(106,13,173,0.1); box-shadow: 0 0 30px rgba(106,13,173,0.3); }

  /* APP */
  .app { position: relative; z-index: 1; width: 100%; max-width: 720px; padding: 0 20px 80px; display: flex; flex-direction: column; align-items: center; }

  .header { text-align: center; padding: 40px 0 20px; width: 100%; }
  .header-server { font-family: 'UnifrakturMaguntia', cursive; font-size: 10px; letter-spacing: 0.4em; color: var(--purple3); opacity: 0.6; margin-bottom: 8px; }
  .header-greeting { font-size: 13px; font-style: italic; color: var(--muted2); margin-bottom: 10px; }
  .header-greeting span { color: var(--purple3); font-style: normal; }
  .header-sigil { font-size: 30px; margin-bottom: 8px; filter: drop-shadow(0 0 14px rgba(106,13,173,0.6)); }
  .header-title { font-family: 'UnifrakturMaguntia', cursive; font-size: clamp(1.8rem, 7vw, 3rem); color: var(--cream); line-height: 1.1; margin-bottom: 4px; }
  .header-title em { color: var(--purple3); font-style: normal; }
  .h-rule { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, var(--purple2), transparent); margin: 14px auto; }
  .header-sub { font-size: 13px; font-style: italic; color: var(--muted2); letter-spacing: 0.06em; }

  /* WHEEL */
  .wheel-wrap {
    position: relative; width: min(560px, 96vw); height: min(560px, 96vw); margin: 20px auto 0;
    filter: drop-shadow(0 0 60px rgba(106,13,173,0.25)) drop-shadow(0 20px 60px rgba(0,0,0,0.8));
  }
  .pointer {
    position: absolute; top: -20px; left: 50%; transform: translateX(-50%); z-index: 10;
    width: 0; height: 0;
    border-left: 14px solid transparent; border-right: 14px solid transparent;
    border-top: 32px solid var(--purple2);
    filter: drop-shadow(0 0 12px rgba(106,13,173,0.9));
  }
  canvas { width: 100%; height: 100%; border-radius: 50%; display: block; }
  .spin-btn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 76px; height: 76px; border-radius: 50%;
    background: var(--black); border: 2px solid var(--purple2); color: var(--purple3);
    font-family: 'UnifrakturMaguntia', cursive; font-size: 14px; letter-spacing: 0.1em;
    cursor: pointer; z-index: 20; transition: all 0.2s;
    box-shadow: 0 0 0 5px rgba(106,13,173,0.08), inset 0 0 20px rgba(106,13,173,0.08); outline: none;
  }
  .spin-btn:hover:not(:disabled) { background: rgba(106,13,173,0.15); box-shadow: 0 0 0 8px rgba(106,13,173,0.15), 0 0 40px rgba(106,13,173,0.4); transform: translate(-50%,-50%) scale(1.06); }
  .spin-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  @keyframes pulse-btn { 0%,100%{opacity:0.4} 50%{opacity:1} }
  .spinning .spin-btn { animation: pulse-btn 0.5s ease infinite; }

  /* RESULT */
  .result-card {
    margin-top: 28px; width: 100%;
    border: 1px solid rgba(106,13,173,0.3);
    background: rgba(10,6,15,0.92); backdrop-filter: blur(16px);
    border-radius: 2px; padding: 28px 32px; text-align: center;
    opacity: 0; transform: translateY(12px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    position: relative; overflow: hidden;
  }
  .result-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--purple2), transparent); }
  .result-card::after  { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(106,13,173,0.4), transparent); }
  .result-card.visible { opacity: 1; transform: translateY(0); }

  .result-label { font-family: 'UnifrakturMaguntia', cursive; font-size: 11px; letter-spacing: 0.3em; color: var(--muted); margin-bottom: 6px; }
  .result-who { font-size: 13px; font-style: italic; color: var(--muted2); margin-bottom: 2px; }
  .result-domme { font-family: 'UnifrakturMaguntia', cursive; font-size: clamp(1.6rem, 7vw, 2.8rem); color: var(--purple3); line-height: 1.2; text-shadow: 0 0 40px rgba(106,13,173,0.6); margin-bottom: 10px; }
  .result-divider { width: 50px; height: 1px; background: linear-gradient(90deg, transparent, var(--purple2), transparent); margin: 10px auto; }
  .result-amount-label { font-family: 'UnifrakturMaguntia', cursive; font-size: 10px; letter-spacing: 0.3em; color: var(--muted); margin-bottom: 4px; }
  .result-amount { font-size: clamp(2.8rem, 11vw, 4.5rem); font-weight: 400; color: var(--cream); line-height: 1; letter-spacing: -0.02em; text-shadow: 0 0 50px rgba(106,13,173,0.4); margin-bottom: 10px; }
  .result-copy { font-size: 15px; font-style: italic; color: var(--muted2); line-height: 1.4; margin-bottom: 14px; }
  .spin-again { display: inline-block; font-family: 'UnifrakturMaguntia', cursive; font-size: 11px; letter-spacing: 0.2em; color: var(--muted); cursor: pointer; border-bottom: 1px solid rgba(74,53,96,0.3); padding-bottom: 2px; transition: color 0.2s; }
  .spin-again:hover { color: var(--purple2); }

  /* LOG */
  .log-section { width: 100%; margin-top: 44px; }
  .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; border-bottom: 1px solid rgba(106,13,173,0.15); padding-bottom: 10px; }
  .log-title { font-family: 'UnifrakturMaguntia', cursive; font-size: 13px; letter-spacing: 0.2em; color: var(--purple3); opacity: 0.75; }
  .log-clear { font-family: 'UnifrakturMaguntia', cursive; font-size: 10px; letter-spacing: 0.15em; color: var(--muted); opacity: 0.5; cursor: pointer; border: none; background: none; transition: opacity 0.2s, color 0.2s; }
  .log-clear:hover { opacity: 1; color: var(--rose); }
  .log-empty { font-size: 13px; font-style: italic; color: var(--muted); opacity: 0.35; text-align: center; padding: 24px 0; }
  .log-list { display: flex; flex-direction: column; gap: 6px; }
  .log-entry { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border: 1px solid rgba(106,13,173,0.12); background: rgba(10,6,15,0.6); border-radius: 1px; animation: slideIn 0.3s ease forwards; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
  .log-left { display: flex; flex-direction: column; gap: 2px; }
  .log-name { font-family: 'UnifrakturMaguntia', cursive; font-size: 14px; color: var(--cream); }
  .log-domme-name { font-size: 11px; font-style: italic; color: var(--purple3); opacity: 0.8; }
  .log-time { font-size: 10px; letter-spacing: 0.1em; color: var(--muted); opacity: 0.5; }
  .log-amount { font-size: 20px; color: var(--purple3); text-shadow: 0 0 16px rgba(106,13,173,0.4); }
  .log-amount.high { color: #e8a0b0; text-shadow: 0 0 16px rgba(232,160,176,0.4); }

  /* FOOTER */
  .footer-section { width: 100%; margin-top: 60px; padding-top: 24px; border-top: 1px solid rgba(106,13,173,0.15); text-align: center; }
  .footer-label { font-family: 'UnifrakturMaguntia', cursive; font-size: 10px; letter-spacing: 0.3em; color: var(--muted); opacity: 0.5; margin-bottom: 6px; }
  .footer-bottom { font-family: 'UnifrakturMaguntia', cursive; font-size: 10px; letter-spacing: 0.3em; color: var(--muted); opacity: 0.3; }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-sigil">🖤</div>
  <div class="gate-server">House of Melanin</div>
  <h1 class="gate-title">Spin for <em>The House</em></h1>
  <div class="gate-rule"></div>
  <p class="gate-sub">bow before you enter.</p>
  <div class="gate-label">state your name</div>
  <input id="gateInput" type="text" placeholder="enter your name" maxlength="30" autocomplete="off" />
  <button id="gateBtn" onclick="enterApp()">Enter</button>
</div>

<div class="app" id="app" style="display:none">
  <header class="header">
    <div class="header-server">House of Melanin</div>
    <div class="header-greeting">kneeling as <span id="greetName"></span></div>
    <div class="header-sigil">🖤</div>
    <h1 class="header-title">Spin for <em>The House</em></h1>
    <div class="h-rule"></div>
    <p class="header-sub">they decide. you obey.</p>
  </header>

  <div class="wheel-wrap" id="wheelWrap">
    <div class="pointer"></div>
    <canvas id="wheel" width="700" height="700"></canvas>
    <button class="spin-btn" id="spinBtn" onclick="spin()">Spin</button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-label">The wheel has spoken</div>
    <div class="result-who" id="resultWho"></div>
    <div class="result-domme" id="resultDomme"></div>
    <div class="result-divider"></div>
    <div class="result-amount-label">Your tribute</div>
    <div class="result-amount" id="resultAmount">$0</div>
    <div class="result-copy" id="resultCopy"></div>
    <div class="spin-again" onclick="resetSpin()">&#8617; spin again</div>
  </div>

  <div class="log-section">
    <div class="log-header">
      <div class="log-title">⚔ Tribute Log</div>
      <button class="log-clear" onclick="clearLog()">Clear All</button>
    </div>
    <div class="log-empty" id="logEmpty">no tributes yet.</div>
    <div class="log-list" id="logList"></div>
  </div>

  <footer class="footer-section">
    <div class="footer-label">House of Melanin</div>
    <div class="footer-bottom">18+ · bow down.</div>
  </footer>
</div>

<script>
  const JSONBIN_KEY = '$2a$10$NWeTz1kyTPPz2E4brtb3gejPhvO3sa.5f.nOfnh8hZBEEOikpQiE2';
  const BIN_ID_KEY  = 'hom_binid';
  let cachedLog = null;

  async function getBinId() {
    let id = localStorage.getItem(BIN_ID_KEY);
    if (id) return id;
    const res = await fetch('https://api.jsonbin.io/v3/b', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY, 'X-Bin-Name': 'hom-spinlog' },
      body: JSON.stringify({ log: [] })
    });
    const data = await res.json();
    id = data.metadata.id;
    localStorage.setItem(BIN_ID_KEY, id);
    return id;
  }

  async function loadLog() {
    try {
      const id = await getBinId();
      const res = await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, { headers: { 'X-Master-Key': JSONBIN_KEY } });
      const data = await res.json();
      cachedLog = data.record.log || [];
    } catch(e) { cachedLog = []; }
    renderLog();
  }

  async function saveLog() {
    try {
      const id = await getBinId();
      await fetch(`https://api.jsonbin.io/v3/b/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
        body: JSON.stringify({ log: cachedLog })
      });
    } catch(e) {}
  }

  async function addEntry(name, domme, amount) {
    if (!cachedLog) cachedLog = [];
    cachedLog.unshift({ name, domme, amount, time: Date.now() });
    renderLog();
    await saveLog();
  }

  async function clearLog() {
    if (confirm('Clear the tribute log?')) {
      cachedLog = [];
      await saveLog();
      renderLog();
    }
  }

  let currentName = '';
  document.getElementById('gateInput').addEventListener('keydown', e => { if (e.key === 'Enter') enterApp(); });

  function enterApp() {
    const val = document.getElementById('gateInput').value.trim();
    if (!val) { document.getElementById('gateInput').style.borderColor = 'rgba(192,57,43,0.7)'; return; }
    currentName = val;
    document.getElementById('greetName').textContent = val;
    const gate = document.getElementById('gate');
    gate.classList.add('out');
    setTimeout(() => {
      gate.style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      loadLog();
      drawWheel(currentAngle);
    }, 600);
  }

  const dommes = [
    'Goddess Foreign', 'Lynna', 'Mistress Natasha', 'Obsidian Hematite',
    'Omi', 'Temptress Cereza', 'Yumi', 'Izbiz', 'Amagloo', 'BrattyBre',
    'Caribbean Goddess', 'Chaotica', 'Chloe', 'Ellie', 'Empress Jade',
    'Eriiilynnn', 'Goddess Miyaki', 'Goddess Naira', 'Goddess Onyx',
    'Goddess V', 'Goddess Jennesy', 'Karti', 'Lady Godiva', 'Miss B',
    'Miss Serenity', 'Mistress Mula', 'Mommy Moon', 'Nicky', 'Nysakhalesi',
    'Poltergeizts', 'Princess Aurorah', 'Princess Morbucks', 'Princess Najai',
    'Princess Seraphim', 'Princess GreedyGiirl', 'Goddess Ria', 'Siren Zuri',
    'Spades', 'Vamptress Dasha', 'Veliana Vixen', 'Zaria', 'Princess Brownie',
    'Miss Mina', 'Enchantress', 'Princess Anya', 'Goddess Yanna',
    'Princess Myiaa', 'Demoness Maria', 'Miss Feetus', 'Goddess Kemi', 'Black Widow', 'TT'
  ];

  const wheelLabels = [
    'Gd. Foreign', 'Lynna', 'Mstrs Natasha', 'Obsidian H.',
    'Omi', 'Tmptrs Cereza', 'Yumi', 'Izbiz', 'Amagloo', 'BrattyBre',
    'Caribbean Gd.', 'Chaotica', 'Chloe', 'Ellie', 'Empress Jade',
    'Eriiilynnn', 'Gd. Miyaki', 'Gd. Naira', 'Gd. Onyx',
    'Goddess V', 'Gd. Jennesy', 'Karti', 'Lady Godiva', 'Miss B',
    'Miss Serenity', 'Mstrs Mula', 'Mommy Moon', 'Nicky', 'Nysakhalesi',
    'Poltergeizts', 'Prns. Aurorah', 'Prns. Morbucks', 'Prns. Najai',
    'Prns. Seraphim', 'Prns. Greedy', 'Gd. Ria', 'Siren Zuri',
    'Spades', 'Vamptrs Dasha', 'Veliana V.', 'Zaria', 'Prns. Brownie',
    'Miss Mina', 'Enchantress', 'Prns. Anya', 'Gd. Yanna',
    'Prns. Myiaa', 'Demoness M.', 'Miss Feetus', 'Gd. Kemi', 'Blk Widow', 'TT'
  ];

  const amounts = [33, 44, 50, 66, 77, 99, 111, 123, 150, 200, 222, 250, 333];

  const copies = [
    "send.", "bow down.", "the melanin decides.",
    "they decide. you obey.", "act accordingly.", "pay up.",
    "no hesitation.", "they're watching.", "now.",
    "this is your purpose.", "honor it.", "don't make them wait.",
  ];

  const palette = [
    '#1a0a2e','#2a0a40','#0f0020','#1e0a30',
    '#0a0a2e','#200a20','#0a1a2e','#2a1040',
    '#150020','#0a2030','#1a0030','#0a0a40',
    '#200020','#0a1520','#1a0a40','#0a2020',
    '#250030','#1a2030','#0a0030','#200a30',
    '#0a1a40','#1a0a1a','#0a2a30','#200a20',
    '#0a0a1a','#1a1a30','#2a0030','#0a1a1a',
    '#150a30','#0a2a20','#1a0020','#200a40',
    '#0a0a30','#1a1a20','#200030','#0a2030',
    '#1a0a30','#0a1a30','#200a20','#1a2020',
    '#0a0020','#1a0a20','#200a30','#0a1a20',
    '#150030','#0a2020','#1a1030','#200020',
    '#0a0a20','#1a2030'
  ];

  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const numSeg = dommes.length;
  const arc = (2 * Math.PI) / numSeg;
  let currentAngle = -Math.PI / 2;
  let spinning = false;

  function drawWheel(angle) {
    const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 10;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const outerGrad = ctx.createRadialGradient(cx, cy, r - 4, cx, cy, r + 14);
    outerGrad.addColorStop(0, 'rgba(106,13,173,0.4)');
    outerGrad.addColorStop(1, 'rgba(106,13,173,0)');
    ctx.beginPath(); ctx.arc(cx, cy, r + 14, 0, 2 * Math.PI);
    ctx.fillStyle = outerGrad; ctx.fill();

    ctx.beginPath(); ctx.arc(cx, cy, r + 4, 0, 2 * Math.PI);
    ctx.fillStyle = '#0a060f'; ctx.fill();
    ctx.strokeStyle = 'rgba(106,13,173,0.6)'; ctx.lineWidth = 2; ctx.stroke();

    dommes.forEach((name, i) => {
      const s = angle + i * arc, e = s + arc;
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, s, e); ctx.closePath();
      ctx.fillStyle = palette[i % palette.length];
      ctx.globalAlpha = 0.95; ctx.fill(); ctx.globalAlpha = 1;
      ctx.strokeStyle = 'rgba(106,13,173,0.3)'; ctx.lineWidth = 1; ctx.stroke();

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(s + arc / 2);
      const label = wheelLabels[i];
      const fs = label.length > 10
        ? Math.max(8, Math.round(canvas.width * 0.016))
        : Math.max(9, Math.round(canvas.width * 0.019));
      ctx.font = `500 ${fs}px "IM Fell English", serif`;
      ctx.textAlign = 'right';
      ctx.fillStyle = 'rgba(199,125,255,0.95)';
      ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 3;
      ctx.fillText(label, r - 14, 4);
      ctx.shadowBlur = 0;
      ctx.restore();
    });

    const capGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 64);
    capGrad.addColorStop(0, '#1a0a2e');
    capGrad.addColorStop(1, '#050305');
    ctx.beginPath(); ctx.arc(cx, cy, 64, 0, 2 * Math.PI);
    ctx.fillStyle = capGrad; ctx.fill();
    ctx.strokeStyle = 'rgba(106,13,173,0.7)'; ctx.lineWidth = 2.5; ctx.stroke();

    ctx.font = '28px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🖤', cx, cy);
    ctx.textBaseline = 'alphabetic';
  }

  function spin() {
    if (spinning) return;
    spinning = true; hideResult();
    document.getElementById('spinBtn').disabled = true;
    document.getElementById('wheelWrap').classList.add('spinning');

    const extraSpins = 6 + Math.floor(Math.random() * 5);
    const randomSeg  = Math.floor(Math.random() * numSeg);
    const segCenter  = -Math.PI / 2 - (randomSeg * arc + arc / 2);
    const target     = extraSpins * 2 * Math.PI + ((segCenter - currentAngle) % (2 * Math.PI) + 4 * Math.PI) % (2 * Math.PI);
    const duration   = 4500 + Math.random() * 1500;
    const startAngle = currentAngle, startTime = performance.now();

    function ease(t) { return 1 - Math.pow(1 - t, 4); }
    function animate(now) {
      const t = Math.min((now - startTime) / duration, 1);
      currentAngle = startAngle + target * ease(t);
      drawWheel(currentAngle);
      if (t < 1) { requestAnimationFrame(animate); }
      else {
        spinning = false;
        document.getElementById('spinBtn').disabled = false;
        document.getElementById('wheelWrap').classList.remove('spinning');
        showResult(randomSeg);
      }
    }
    requestAnimationFrame(animate);
  }

  function showResult(segIndex) {
    const domme  = dommes[segIndex];
    const amount = amounts[Math.floor(Math.random() * amounts.length)];
    const copy   = copies[Math.floor(Math.random() * copies.length)];

    document.getElementById('resultWho').textContent    = currentName + ', you serve:';
    document.getElementById('resultDomme').textContent  = domme;
    document.getElementById('resultAmount').textContent = '$' + amount;
    document.getElementById('resultCopy').textContent   = copy;
    document.getElementById('resultCard').classList.add('visible');
    addEntry(currentName, domme, amount);
  }

  function hideResult() { document.getElementById('resultCard').classList.remove('visible'); }
  function resetSpin()  { hideResult(); }

  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      + ' · ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function renderLog() {
    const log = cachedLog || [];
    const emptyEl = document.getElementById('logEmpty');
    const listEl  = document.getElementById('logList');
    listEl.innerHTML = '';
    if (log.length === 0) { emptyEl.style.display = 'block'; return; }
    emptyEl.style.display = 'none';
    log.forEach(entry => {
      const div = document.createElement('div');
      div.className = 'log-entry';
      div.innerHTML = `
        <div class="log-left">
          <div class="log-name">${entry.name}</div>
          <div class="log-domme-name">${entry.domme}</div>
          <div class="log-time">${formatTime(entry.time)}</div>
        </div>
        <div class="log-amount ${entry.amount >= 250 ? 'high' : ''}">$${entry.amount}</div>
      `;
      listEl.appendChild(div);
    });
  }
</script>
</body>
</html>
